<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromptBattle — BATTLE UNIVERSE</title>
  <meta name="description" content="AI 出图对战平台 — PromptBattle Gallery" />
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ═══ Header / Navigation (fixed top) ═══ -->
  <header id="site-header">
    <div class="header-inner">
      <a href="#" class="brand">
        <img src="assets/logo.svg" alt="BATTLE UNIVERSE" class="logo-img" />
      </a>
      <nav class="nav-links">
        <a href="#gallery" class="nav-link active">画廊</a>
        <a href="#about" class="nav-link">关于</a>
        <a href="#rankings" class="nav-link">排行榜</a>
      </nav>
    </div>
  </header>

  <!-- ═══ Hero Banner ═══ -->
  <section id="hero">
    <div class="hero-inner">
      <img src="assets/hero-title.svg" alt="Prompt Battle" class="hero-graphic" />
    </div>
  </section>

  <!-- ═══ Main Gallery — Masonry Grid ═══ -->
  <main id="gallery">
    <div class="gallery-grid" id="masonry-grid">
      <!-- Cards injected by app.js from GALLERY_DATA -->
    </div>
    <div class="loading-indicator" id="loader">
      <span></span><span></span><span></span>
    </div>
  </main>

  <!-- ═══ Footer ═══ -->
  <footer id="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="assets/logo.svg" alt="BATTLE UNIVERSE" class="footer-logo" />
        <p class="footer-tagline">PromptBattle — AI 出图对战平台</p>
      </div>
      <div class="footer-links">
        <a href="#">使用条款</a>
        <a href="#">隐私政策</a>
        <a href="#">联系我们</a>
      </div>
      <div class="footer-copy">&copy; 2025 BATTLE UNIVERSE. All rights reserved.</div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
